<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background-color: #fafafa;
            font-family: Arial, sans-serif;
            color: #333;
            text-align: center;
            padding: 50px;
        }

        header {
            font-size: 2em;
            color: #2a5179;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            color: #a76666;
            margin-bottom: 30px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>
    <header>My First Webpage</header>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Saepe suscipit ut eligendi dolorem dolores consequuntur
        dolor architecto esse, iusto labore?</p>
    <button>Click here</button>
</body>

</html>
